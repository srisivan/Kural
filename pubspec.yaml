name: thirukkural_app
description: A daily Thirukkural app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Local persistence (progress tracking)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Daily 7:30 AM notification
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4

  # Screenshot + share
  screenshot: ^3.0.0
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # Fonts (Tamil support)
  google_fonts: ^6.2.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^4.0.0

  # App launcher icon + native splash generation
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/thirukkural.json
    - assets/data/detail.json
    - assets/icon/kural_icon.png

# Launcher icon generated from the dropped 1024x1024 PNG.
flutter_launcher_icons:
  image_path: "assets/icon/kural_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
  # Adaptive icon for Android: deep-blue background, PNG as foreground.
  adaptive_icon_background: "#0A92C4"
  adaptive_icon_foreground: "assets/icon/kural_icon.png"

# Native splash: deep-blue background with the icon centered.
flutter_native_splash:
  color: "#0A92C4"
  image: assets/icon/kural_icon.png
  android_12:
    color: "#0A92C4"
    image: assets/icon/kural_icon.png
